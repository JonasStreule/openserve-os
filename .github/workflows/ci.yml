name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository_owner }}/openserve-os-backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/openserve-os-frontend

jobs:
  # ─────────────────────────────────────────────
  # 1. Backend tests
  # ─────────────────────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: openserve_test
          POSTGRES_USER: dev
          POSTGRES_PASSWORD: dev123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://dev:dev123@localhost:5432/openserve_test
        run: |
          for f in migrations/*.sql; do
            psql "$DATABASE_URL" -f "$f" || true
          done

      - name: Run tests
        env:
          DATABASE_URL: postgresql://dev:dev123@localhost:5432/openserve_test
          JWT_SECRET: test-secret
          NODE_ENV: test
        run: npm test

  # ─────────────────────────────────────────────
  # 2. Frontend build check
  # ─────────────────────────────────────────────
  build-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ''

  # ─────────────────────────────────────────────
  # 3. Build & push Docker images (main only)
  # ─────────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # 4. Health check after push (optional)
  #    Set PRODUCTION_URL secret in repo settings
  # ─────────────────────────────────────────────
  health-check:
    name: Production Health Check
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/main' && vars.PRODUCTION_URL != ''

    steps:
      - name: Check /api/health
        run: |
          URL="${{ vars.PRODUCTION_URL }}/api/health"
          echo "Checking $URL …"
          STATUS=$(curl -sf "$URL" | jq -r '.status')
          echo "Status: $STATUS"
          [[ "$STATUS" == "ok" ]] || exit 1
